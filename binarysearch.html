<!DOCTYPE html>
<html>
<head>
<title>Binary Search Tree Search</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#f4f6f9;
}

input,button{
    padding:8px;
    margin:5px;
}

.tree ul{
    padding-top:20px;
    position:relative;
}

.tree li{
    display:inline-block;
    text-align:center;
    list-style-type:none;
    position:relative;
    padding:20px 5px 0 5px;
}

.tree li::before,
.tree li::after{
    content:'';
    position:absolute;
    top:0;
    right:50%;
    border-top:2px solid #555;
    width:50%;
    height:20px;
}

.tree li::after{
    right:auto;
    left:50%;
    border-left:2px solid #555;
}

.tree li:only-child::after,
.tree li:only-child::before{
    display:none;
}

.tree li:first-child::before,
.tree li:last-child::after{
    border:none;
}

.node{
    border:2px solid black;
    padding:10px;
    border-radius:6px;
    background:white;
    min-width:40px;
}

.visit{
    background:orange;
}

.found{
    background:lightgreen;
}

</style>
</head>

<body>

<h2>Binary Search Tree Visualization</h2>

<input type="text" id="arrayInput" placeholder="Enter numbers (comma separated)">
<button onclick="buildTree()">Build Tree</button>

<br><br>

<input type="number" id="keyInput" placeholder="Enter key to search">
<button onclick="search()">Search</button>

<h3 id="result"></h3>

<div class="tree">
<ul id="treeRoot"></ul>
</div>

<script>

class Node{
constructor(value){
this.value=value
this.left=null
this.right=null
this.element=null
}
}

let root=null

function insert(node,value){

if(node==null)
return new Node(value)

if(value<node.value)
node.left=insert(node.left,value)

else
node.right=insert(node.right,value)

return node
}

function buildTree(){

let arr=document.getElementById("arrayInput").value
.split(",")
.map(Number)

root=null

arr.forEach(v=>{
root=insert(root,v)
})

let container=document.getElementById("treeRoot")
container.innerHTML=""

drawTree(root,container)

}

function drawTree(node,parent){

if(node==null) return

let li=document.createElement("li")

let div=document.createElement("div")
div.className="node"
div.innerText=node.value

node.element=div

li.appendChild(div)
parent.appendChild(li)

let ul=document.createElement("ul")
li.appendChild(ul)

drawTree(node.left,ul)
drawTree(node.right,ul)

}

async function search(){

let key=Number(document.getElementById("keyInput").value)

let current=root

while(current!=null){

current.element.classList.add("visit")

await sleep(800)

if(key==current.value){

current.element.classList.remove("visit")
current.element.classList.add("found")

document.getElementById("result").innerText="Element Found"
return
}

else if(key<current.value)
current=current.left

else
current=current.right

}

document.getElementById("result").innerText="Element Not Found"

}

function sleep(ms){
return new Promise(r=>setTimeout(r,ms))
}

</script>

</body>
</html>
